<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="base">
  <!-- Group with translation and rotation -->
  <g transform="translate(20, 20) rotate(45)">
    <!-- Rect (will become path) -->
    <rect x="10" y="10" width="30" height="20" fill="blue" stroke="black" />
    <!-- Circle (will become path) -->
    <circle cx="60" cy="20" r="15" fill="green" stroke="none" />
  </g>

  <!-- Group with scale -->
  <g transform="scale(1.5)">
    <!-- Ellipse -->
    <ellipse cx="80" cy="80" rx="20" ry="10" fill="yellow" stroke="black" />
    <!-- Line -->
    <line x1="10" y1="100" x2="50" y2="100" stroke="purple" stroke-width="2" />
  </g>

  <!-- Nested groups with skew -->
  <g transform="translate(100, 100)">
    <g transform="skewX(20)">
        <!-- Polyline -->
        <polyline points="0,0 20,20 40,0" fill="none" stroke="orange" stroke-width="2" />
        <!-- Polygon -->
        <polygon points="50,50 70,70 90,50" fill="cyan" stroke="black" />
    </g>
  </g>
  </g>
</svg>