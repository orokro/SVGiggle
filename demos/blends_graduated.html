<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVGiggle - Graduated Blends Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-end; }
        .item { text-align: center; }
        svg { border: 1px solid #ccc; width: 100px; height: 100px; display: block; }
        /* Template styles */
        .template { display: none; }
    </style>
    <script src="../dist/svgiggle.iife.js"></script>
</head>
<body>
    <h1>Graduated Blends Demo</h1>
    <p>Testing linear interpolation of "move-right" and "move-up" on a rectangle.</p>

    <!-- Template for rect_blends.svg -->
    <div id="templates">
        <template id="tpl-rect_blends">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
              <g id="base">
                <rect id="rect" x="10" y="10" width="20" height="20" fill="red" />
              </g>
              <g id="move-up">
                <rect id="rect" x="10" y="0" width="20" height="20" fill="red" />
              </g>
              <g id="move-right">
                <rect id="rect" x="20" y="10" width="20" height="20" fill="red" />
              </g>
            </svg>
        </template>
    </div>

    <h2>Move Right (0.0 to 1.0)</h2>
    <div id="row-right" class="row"></div>

    <h2>Move Up (0.0 to 1.0)</h2>
    <div id="row-up" class="row"></div>

    <h2>Diagonal (Both 0.0 to 1.0)</h2>
    <div id="row-diag" class="row"></div>

    <script>
        const Lib = SVGiggle.SVGiggle || SVGiggle;
        const tpl = document.getElementById('tpl-rect_blends');

        async function createInstance() {
            const svgElement = tpl.content.querySelector('svg').cloneNode(true);
            const s = new Lib(svgElement);
            await s.ready;
            return s;
        }

        async function run() {
            const steps = [0.0, 0.25, 0.5, 0.75, 1.0];

            // Row Right
            const rowRight = document.getElementById('row-right');
            for (const val of steps) {
                const s = await createInstance();
                s.blend('move-right', val);
                
                const div = document.createElement('div');
                div.className = 'item';
                div.appendChild(s.svg);
                div.innerHTML += `<div>${val}</div>`;
                rowRight.appendChild(div);
            }

            // Row Up
            const rowUp = document.getElementById('row-up');
            for (const val of steps) {
                const s = await createInstance();
                s.blend('move-up', val);
                
                const div = document.createElement('div');
                div.className = 'item';
                div.appendChild(s.svg);
                div.innerHTML += `<div>${val}</div>`;
                rowUp.appendChild(div);
            }

            // Row Diagonal
            const rowDiag = document.getElementById('row-diag');
            for (const val of steps) {
                const s = await createInstance();
                s.blend({
                    'move-right': val,
                    'move-up': val
                });
                
                const div = document.createElement('div');
                div.className = 'item';
                div.appendChild(s.svg);
                div.innerHTML += `<div>${val}</div>`;
                rowDiag.appendChild(div);
            }
        }

        run();
    </script>
</body>
</html>
